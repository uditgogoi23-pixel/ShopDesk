{% extends 'base.html' %}
{% block title %}Add Product{% endblock %}

{% block breadcrumb %}
  <a href="{{ url_for('products.index') }}">Products</a> › <strong>Add Product</strong>
{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1>Add New Product</h1>
    <p>Add a product to your catalogue</p>
  </div>
</div>

<div class="card" style="max-width: 560px;">
  <div class="card-header">
    <span class="card-title">Product Details</span>
  </div>
  <div class="card-body">
    <form method="POST">

      <div class="form-group">
        <label class="form-label">Product Name *</label>
        <input type="text" name="product_name" class="form-control"
               placeholder="e.g. Amul Butter 500g" required autofocus>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select name="category" class="form-control">
            <option value="">— Select Category —</option>
            {% for cat in categories %}
              <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Selling Price (₹) *</label>
          <input type="number" name="price" class="form-control"
                 placeholder="0.00" min="0" step="0.01" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Opening Stock (units)</label>
        <input type="number" name="stock" class="form-control"
               placeholder="0" min="0" value="0">
        <div class="form-hint">How many units do you have right now?</div>
      </div>

      <div class="d-flex gap-10 mt-16">
        <button type="submit" class="btn btn-amber">Save Product</button>
        <a href="{{ url_for('products.index') }}" class="btn btn-outline">Cancel</a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
