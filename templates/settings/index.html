{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left">
        <h1 class="page-title">Business Settings</h1>
        <p class="page-subtitle">Configure your shop details, GST, and preferences.</p>
    </div>
</div>

<form method="POST">

    <!-- SHOP INFO -->
    <div class="card" style="margin-bottom: 24px;">
        <div class="card-header">
            <div>
                <div class="card-title">Shop Information</div>
                <div class="card-subtitle">This appears on receipts and invoices.</div>
            </div>
        </div>
        <div class="card-body" style="padding: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;">
            <div class="form-group">
                <label class="form-label">Shop Name *</label>
                <input type="text" name="shop_name" class="form-control"
                       value="{{ settings.shop_name or '' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Owner Name</label>
                <input type="text" name="owner_name" class="form-control"
                       value="{{ settings.owner_name or '' }}">
            </div>
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control"
                       value="{{ settings.phone or '' }}">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       value="{{ settings.email or '' }}">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" rows="2">{{ settings.address or '' }}</textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Business Type</label>
                <select name="business_type" class="form-control">
                    {% for btype in ['Retail', 'Wholesale', 'Restaurant', 'Pharmacy', 'Electronics', 'Grocery'] %}
                    <option value="{{ btype }}" {{ 'selected' if settings.business_type == btype }}>{{ btype }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Currency</label>
                <select name="currency" class="form-control">
                    <option value="INR" {{ 'selected' if settings.currency == 'INR' }}>₹ INR — Indian Rupee</option>
                    <option value="USD" {{ 'selected' if settings.currency == 'USD' }}>$ USD — US Dollar</option>
                    <option value="EUR" {{ 'selected' if settings.currency == 'EUR' }}>€ EUR — Euro</option>
                </select>
            </div>
        </div>
    </div>

    <!-- GST SETTINGS -->
    <div class="card" style="margin-bottom: 24px;">
        <div class="card-header">
            <div>
                <div class="card-title">GST Configuration</div>
                <div class="card-subtitle">Controls tax calculation on every sale.</div>
            </div>
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" name="gst_enabled" id="gstToggle"
                       {{ 'checked' if settings.gst_enabled }}
                       onchange="document.getElementById('gstFields').style.display = this.checked ? 'grid' : 'none'">
                <span class="form-label" style="margin:0;">Enable GST</span>
            </label>
        </div>
        <div class="card-body" id="gstFields"
             style="padding: 1.5rem; display: {{ 'grid' if settings.gst_enabled else 'none' }};
                    grid-template-columns: 1fr 1fr; gap: 1.25rem;">
            <div class="form-group">
                <label class="form-label">GST Number (GSTIN)</label>
                <input type="text" name="gst_number" class="form-control"
                       value="{{ settings.gst_number or '' }}"
                       placeholder="22AAAAA0000A1Z5">
            </div>
            <div class="form-group">
                <label class="form-label">Default GST Rate (%)</label>
                <input type="number" name="default_gst_rate" class="form-control"
                       value="{{ settings.default_gst_rate or 18 }}"
                       min="0" max="100" step="0.01">
            </div>
            <div class="form-group">
                <label class="form-label">GST Mode</label>
                <select name="gst_mode" class="form-control">
                    <option value="Inclusive" {{ 'selected' if settings.gst_mode == 'Inclusive' }}>Inclusive — GST included in price</option>
                    <option value="Exclusive" {{ 'selected' if settings.gst_mode == 'Exclusive' }}>Exclusive — GST added on top</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Registration Type</label>
                <select name="gst_registration_type" class="form-control">
                    <option value="Regular"       {{ 'selected' if settings.gst_registration_type == 'Regular' }}>Regular</option>
                    <option value="Composition"   {{ 'selected' if settings.gst_registration_type == 'Composition' }}>Composition</option>
                    <option value="Unregistered"  {{ 'selected' if settings.gst_registration_type == 'Unregistered' }}>Unregistered</option>
                </select>
            </div>
        </div>
    </div>

    <!-- SAVE -->
    <div style="display:flex; gap:1rem;">
        <button type="submit" class="btn btn-primary">Save Settings</button>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Cancel</a>
    </div>

</form>
{% endblock %}
